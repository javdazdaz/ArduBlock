<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArduBlock — Debug CH340 Web Serial</title>
<style>
  body { font-family: monospace; max-width: 800px; margin: 40px auto; 
         background: #1a1a2e; color: #e0e0e0; padding: 20px; }
  button { padding: 10px 20px; margin: 5px; cursor: pointer; font-size: 14px; }
  #log { background: #0d0d1a; color: #0f0; padding: 15px; min-height: 300px; 
         margin: 15px 0; white-space: pre-wrap; font-size: 13px; overflow-y: auto; max-height: 400px; }
  .info { color: #5af; }
  .success { color: #0f0; }
  .error { color: #f55; }
  .warn { color: #fa0; }
  h2 { border-bottom: 1px solid #333; padding-bottom: 5px; }
  .step { background: #16213e; padding: 15px; margin: 10px 0; border-radius: 4px; }
</style>
</head>
<body>
<h1>🔌 Debug CH340 — Web Serial + stk500v1</h1>
<p>Conectá tu Arduino Uno R3 (CH340) y seguí los pasos.</p>

<div class="step">
  <strong>Paso 1:</strong> Probar DTR toggle + sync básico
  <br>
  <button id="btnTestDTR">1️⃣ DTR + Sync</button>
  <button id="btnBlink">2️⃣ Flashear Blink</button>
  <button id="btnInfo">3️⃣ Info Puerto</button>
</div>

<div id="log">[Log] Esperando acción...</div>

<script>
const log = document.getElementById('log');

function logMsg(msg, cls = '') {
  const ts = new Date().toLocaleTimeString();
  log.innerHTML += `<span class="${cls}">[${ts}] ${msg}</span>\n`;
  log.scrollTop = log.scrollHeight;
}

const STK_INSYNC = 0x14;
const STK_OK     = 0x10;

// ── Botón: test DTR + sync ──
document.getElementById('btnTestDTR').addEventListener('click', async () => {
  log.innerHTML = '';
  logMsg('=== Test DTR + Sync ===', 'info');
  
  if (!('serial' in navigator)) {
    logMsg('✕ Web Serial no soportado. Usá Chrome/Edge/Opera.', 'error');
    return;
  }
  
  let port;
  try {
    // 1. Seleccionar puerto
    logMsg('💡 Seleccioná el puerto del Arduino CH340...', 'info');
    port = await navigator.serial.requestPort();
    logMsg(`✓ Puerto seleccionado: ${port.getInfo()?.usbVendorId?.toString(16)}:${port.getInfo()?.usbProductId?.toString(16)}`, 'success');
    
    // 2. Abrir a 115200
    await port.open({ baudRate: 115200, dataBits: 8, stopBits: 1, parity: 'none' });
    logMsg('✓ Puerto abierto a 115200 baud', 'success');
    
    // 3. Toggle DTR
    logMsg('🔄 Toggle DTR...', 'info');
    try {
      await port.setSignals({ dataTerminalReady: false, requestToSend: false });
      logMsg('   DTR=false, RTS=false', 'info');
      await delay(50);
      await port.setSignals({ dataTerminalReady: true, requestToSend: false });
      logMsg('   DTR=true (pulso de reset enviado)', 'success');
      await delay(250);
    } catch (e) {
      logMsg('⚠ setSignals falló: ' + e.message, 'warn');
      logMsg('   El driver CH340 puede no soportar control de señales.', 'warn');
    }
    
    // 4. Sync stk500v1
    logMsg('🔄 Intentando sync stk500v1...', 'info');
    const reader = port.readable.getReader();
    
    let synced = false;
    for (let attempt = 0; attempt < 10; attempt++) {
      try {
        const writer = port.writable.getWriter();
        try {
          await writer.write(new Uint8Array([0x30, 0x20]));
        } finally {
          writer.releaseLock();
        }
        
        const resp = await readWithTimeout(reader, 200);
        if (resp.length >= 2 && resp[0] === STK_INSYNC && resp[1] === STK_OK) {
          logMsg(`✓ Sync exitoso en intento ${attempt + 1}! Respuesta: 0x${resp[0].toString(16)} 0x${resp[1].toString(16)}`, 'success');
          synced = true;
          break;
        } else if (resp.length > 0) {
          logMsg(`   Intento ${attempt + 1}: respuesta inesperada ${Array.from(resp).map(b=>'0x'+b.toString(16)).join(' ')}`, 'warn');
        }
      } catch (e) {
        logMsg(`   Intento ${attempt + 1}: ${e.message}`, 'warn');
      }
      await delay(100);
    }
    
    reader.releaseLock();
    
    if (!synced) {
      logMsg('✕ No se pudo sincronizar con el bootloader', 'error');
      logMsg('  Posibles causas:', 'warn');
      logMsg('  1. El driver CH340 no toggled DTR → el bootloader no se activó', 'warn');
      logMsg('  2. Probá presionar RESET manualmente justo después de hacer clic en "DTR+Sync"', 'warn');
      logMsg('  3. El cable USB puede ser solo de carga (sin datos)', 'warn');
    }
    
    await port.close();
    
  } catch (e) {
    logMsg('✕ Error: ' + e.message, 'error');
  }
});

// ── Botón: flashear Blink (COMPLETO — programa la flash) ──
document.getElementById('btnBlink').addEventListener('click', async () => {
  log.innerHTML = '';
  logMsg('=== Flashear Blink real ===', 'info');
  
  if (!('serial' in navigator)) {
    logMsg('✕ Web Serial no soportado. Usá Chrome/Edge/Opera.', 'error');
    return;
  }

  // Blink real compilado con arduino-cli en VPS (924 bytes, verificado)
  const blinkHex = `:100000000C945C000C946E000C946E000C946E00CA
:100010000C946E000C946E000C946E000C946E00A8
:100020000C946E000C946E000C946E000C946E0098
:100030000C946E000C946E000C946E000C946E0088
:100040000C9413010C946E000C946E000C946E00D2
:100050000C946E000C946E000C946E000C946E0068
:100060000C946E000C946E00000000002400270029
:100070002A0000000000250028002B0004040404CE
:100080000404040402020202020203030303030342
:10009000010204081020408001020408102001021F
:1000A00004081020000000080002010000030407FB
:1000B000000000000000000011241FBECFEFD8E0B8
:1000C000DEBFCDBF21E0A0E0B1E001C01D92A930AC
:1000D000B207E1F70E945D010C94CC010C94000082
:1000E000E1EBF0E02491EDE9F0E09491E9E8F0E053
:1000F000E491EE23C9F0222339F0233001F1A8F472
:10010000213019F1223029F1F0E0EE0FFF1FEE58F7
:10011000FF4FA591B4912FB7F894EC91811126C0AF
:1001200090959E239C932FBF08952730A9F02830E7
:10013000C9F0243049F7209180002F7D03C0209121
:1001400080002F7720938000DFCF24B52F7724BD48
:10015000DBCF24B52F7DFBCF2091B0002F772093EC
:10016000B000D2CF2091B0002F7DF9CF9E2BDACFF7
:100170003FB7F8948091050190910601A091070185
:10018000B091080126B5A89B05C02F3F19F0019634
:10019000A11DB11D3FBFBA2FA92F982F8827BC01E1
:1001A000CD01620F711D811D911D42E0660F771F09
:1001B000881F991F4A95D1F708958F929F92AF9209
:1001C000BF92CF92DF92EF92FF920E94B8004B0154
:1001D0005C0184EFC82EDD24D394E12CF12C0E9425
:1001E000B800681979098A099B09683E734081053E
:1001F0009105A8F321E0C21AD108E108F10888EEC0
:10020000880E83E0981EA11CB11CC114D104E10426
:10021000F10429F7FF90EF90DF90CF90BF90AF905F
:100220009F908F9008951F920F920FB60F921124F6
:100230002F933F938F939F93AF93BF93809101012F
:1002400090910201A0910301B0910401309100014D
:1002500023E0230F2D3758F50196A11DB11D2093E2
:1002600000018093010190930201A0930301B093D8
:1002700004018091050190910601A0910701B091C0
:1002800008010196A11DB11D8093050190930601FF
:10029000A0930701B0930801BF91AF919F918F91F7
:1002A0003F912F910F900FBE0F901F90189526E849

:1002C00084BD84B5816084BD85B5826085BD85B5FA
:1002D000816085BD80916E00816080936E00109278
:1002E00081008091810082608093810080918100F3
:1002F0008160809381008091800081608093800084

:100310008093B00080917A00846080937A0080910D
:100320007A00826080937A0080917A008160809365
:100330007A0080917A00806880937A001092C100E0
:10034000EDE9F0E02491E9E8F0E08491882399F068
:1003500090E0880F991FFC01E859FF4FA591B491D7
:10036000FC01EE58FF4F859194918FB7F894EC9172
:10037000E22BEC938FBFC0E0D0E081E00E947000E0
:100380000E94DD0080E00E9470000E94DD00209746
:0C039000A1F30E940000F1CFF894FFCF11
:00000001FF`;

  const STK_GET_SYNC      = 0x30;
  const STK_SET_DEVICE    = 0x42;
  const STK_ENTER_PROGMODE = 0x50;
  const STK_LEAVE_PROGMODE = 0x51;
  const STK_LOAD_ADDRESS  = 0x55;
  const STK_PROG_PAGE     = 0x64;
  const STK_READ_SIGN     = 0x75;
  let seq = 0;

  async function sendCommand(reader, port, cmd, data = []) {
    const msgLen = data.length;
    const token = 0x0E;
    const msg = [0x1B, seq, msgLen, token, cmd, ...data];
    let checksum = 0x00;
    for (let i = 1; i < msg.length; i++) checksum ^= msg[i];
    msg.push(checksum);
    seq = (seq + 1) & 0xFF;
    
    // Escribir y esperar flush (crítico para CH340 en Windows)
    const writer = port.writable.getWriter();
    try {
      await writer.write(new Uint8Array(msg));
      // writer.ready resuelve cuando el buffer se vació al hardware
      // Sin esto, CH340 en Windows puede no haber transmitido aún
      await writer.ready;
    } finally {
      writer.releaseLock();
    }
    
    // Pequeña pausa para que el bootloader procese
    await delay(5);
    
    const resp = await readWithTimeout(reader, 5000);
    if (resp.length < 2) throw new Error('Respuesta vacía del bootloader');
    if (resp[0] !== STK_INSYNC) throw new Error(`Bootloader no sincronizado (0x${resp[0].toString(16)})`);
    return resp;
  }

  function parseHex(hexText) {
    const mem = new Map();
    for (const raw of hexText.trim().split(/\\r?\\n/)) {
      const line = raw.trim();
      if (!line.startsWith(':')) continue;
      const byteCount = parseInt(line.slice(1,3), 16);
      const address   = parseInt(line.slice(3,7), 16);
      const recordType = parseInt(line.slice(7,9), 16);
      if (recordType !== 0) continue;
      const bytes = [];
      for (let i = 0; i < byteCount; i++) bytes.push(parseInt(line.slice(9+i*2, 11+i*2), 16));
      mem.set(address, (mem.get(address) || []).concat(bytes));
    }
    return [...mem.entries()].sort((a,b)=>a[0]-b[0]).map(([addr,bytes]) => ({address: addr, data: new Uint8Array(bytes)}));
  }

  let port;
  try {
    // 1. Abrir puerto + DTR
    port = await navigator.serial.requestPort();
    logMsg(`✓ Puerto: VID 0x${port.getInfo()?.usbVendorId?.toString(16) || '?'} PID 0x${port.getInfo()?.usbProductId?.toString(16) || '?'}`, 'success');
    await port.open({ baudRate: 115200, dataBits: 8, stopBits: 1, parity: 'none' });
    await port.setSignals({ dataTerminalReady: false, requestToSend: false });
    await delay(50);
    await port.setSignals({ dataTerminalReady: true, requestToSend: false });
    await delay(250);
    logMsg('✓ DTR toggled', 'success');

    const reader = port.readable.getReader();

    // 2. Sync (raw wake-up como hace Arduino IDE)
    logMsg('🔄 Sync...', 'info');
    let synced = false;
    for (let i = 0; i < 10; i++) {
      const w = port.writable.getWriter();
      try { await w.write(new Uint8Array([0x30, 0x20])); } finally { w.releaseLock(); }
      await delay(50); // CH340 necesita pausa entre write y read
      const resp = await readWithTimeout(reader, 400);
      if (resp.length >= 2 && resp[0] === STK_INSYNC && resp[1] === STK_OK) {
        synced = true; logMsg(`✓ Sync OK (intento ${i+1})`, 'success'); break;
      }
      if (resp.length > 0) {
        logMsg(`   Intento ${i+1}: ${Array.from(resp).map(b=>'0x'+b.toString(16).padStart(2,'0')).join(' ')}`, 'warn');
      }
      await delay(100);
    }
    if (!synced) { logMsg('✕ Sync falló', 'error'); reader.releaseLock(); await port.close(); return; }

    // Pequeña pausa post-sync para estabilizar el bootloader
    await delay(100);

    // 3. STK_GET_SYNC formal (formato STK) — algunos bootloaders lo requieren
    //    antes de aceptar SET_DEVICE
    logMsg('📡 STK_GET_SYNC formal...', 'info');
    try {
      const syncResp = await sendCommand(reader, port, STK_GET_SYNC, []);
      if (syncResp[0] === STK_INSYNC && syncResp[1] === STK_OK) {
        logMsg('✓ GET_SYNC OK', 'success');
      }
    } catch (e) {
      logMsg('⚠ GET_SYNC formal falló: ' + e.message + ' — continuando igual...', 'warn');
    }

    // 4. Enter programming mode
    logMsg('📟 Enter progmode...', 'info');
    const deviceParams = [0x86,0x00,0x00,0x01,0x01,0x01,0x3F,0x0F,0x00,0x00,0xFF,0xFF,0xFF,0xFF,0xFF,0xFF,0xFF,0xFF,0xFF,0xFF];
    await sendCommand(reader, port, STK_SET_DEVICE, deviceParams);
    const enterResp = await sendCommand(reader, port, STK_ENTER_PROGMODE);
    if (enterResp[1] !== STK_OK) { logMsg('✕ No se pudo entrar en modo programación', 'error'); reader.releaseLock(); await port.close(); return; }
    logMsg('✓ Modo programación', 'success');

    // 5. Leer firma
    const sigResp = await sendCommand(reader, port, STK_READ_SIGN);
    logMsg(`🔍 Firma: 0x${sigResp[2]?.toString(16)} 0x${sigResp[3]?.toString(16)} 0x${sigResp[4]?.toString(16)}`, 'info');

    // 6. Programar flash
    const blocks = parseHex(blinkHex);
    logMsg(`📦 ${blocks.length} bloques para flashear`, 'info');
    const pageSize = 128;
    let totalBytes = 0;
    for (const block of blocks) {
      let addr = block.address;
      const data = block.data;
      const wordAddr = Math.floor(addr / 2);
      await sendCommand(reader, port, STK_LOAD_ADDRESS, [wordAddr & 0xFF, (wordAddr >> 8) & 0xFF]);
      let offset = 0;
      while (offset < data.length) {
        const chunk = data.slice(offset, offset + pageSize);
        const sizeHi = (chunk.length >> 8) & 0xFF;
        const sizeLo = chunk.length & 0xFF;
        const payload = [sizeHi, sizeLo, 0x20, ...Array.from(chunk)];
        await sendCommand(reader, port, STK_PROG_PAGE, payload);
        offset += pageSize;
        addr += pageSize;
        totalBytes += chunk.length;
        if (offset < data.length) {
          const wa = Math.floor(addr / 2);
          await sendCommand(reader, port, STK_LOAD_ADDRESS, [wa & 0xFF, (wa >> 8) & 0xFF]);
        }
        if (totalBytes % 256 === 0) logMsg(`   ${totalBytes} bytes...`, 'info');
      }
    }
    logMsg(`✅ ${totalBytes} bytes programados`, 'success');

    // 7. Salir de progmode
    try { await sendCommand(reader, port, STK_LEAVE_PROGMODE); } catch(_){}
    reader.releaseLock();
    await port.close();
    logMsg('🎉 ¡Blink flasheado! El LED en pin 13 debería parpadear.', 'success');

  } catch (e) {
    logMsg('✕ Error: ' + e.message, 'error');
    try { await port?.close(); } catch(_) {}
  }
});

// ── Botón: info del puerto ──
document.getElementById('btnInfo').addEventListener('click', async () => {
  log.innerHTML = '';
  logMsg('=== Info del Puerto ===', 'info');
  
  if (!('serial' in navigator)) {
    logMsg('✕ Web Serial no soportado', 'error');
    return;
  }
  
  try {
    const port = await navigator.serial.requestPort();
    const info = port.getInfo();
    logMsg(`VID: 0x${info.usbVendorId?.toString(16) || '?'}`, 'info');
    logMsg(`PID: 0x${info.usbProductId?.toString(16) || '?'}`, 'info');
    
    if (info.usbVendorId === 0x1A86) {
      logMsg('✅ Chip CH34x detectado (WCH)', 'success');
      if (info.usbProductId === 0x7523) logMsg('   Modelo: CH340', 'info');
      else if (info.usbProductId === 0x5523) logMsg('   Modelo: CH341', 'info');
    }
    
    // Ver si setSignals está disponible
    try {
      await port.open({ baudRate: 9600 });
      try {
        await port.setSignals({ dataTerminalReady: false, requestToSend: false });
        logMsg('✓ setSignals() disponible en este puerto', 'success');
      } catch (e) {
        logMsg('✕ setSignals() NO disponible: ' + e.message, 'error');
        logMsg('  Esto explica por qué falla: el driver no permite control DTR.', 'warn');
      }
      await port.close();
    } catch (e) {
      logMsg('✕ No se pudo abrir el puerto: ' + e.message, 'error');
    }
    
  } catch (e) {
    logMsg('✕ Cancelado o error: ' + e.message, 'warn');
  }
});

// Helpers
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

/** Drena bytes residuales del reader (post-sync o entre comandos). */
async function drainReader(reader) {
  try {
    while (true) {
      const { value, done } = await reader.read();
      if (done || !value || value.length === 0) break;
    }
  } catch (_) { /* reader puede no tener datos */ }
}

async function readWithTimeout(reader, ms) {
  const readPromise = (async () => {
    const chunks = [];
    while (true) {
      const { value, done } = await reader.read();
      if (value) chunks.push(value);
      if (done) break;
      if (chunks.length > 0) { await delay(30); break; }
    }
    const total = chunks.reduce((s, c) => s + c.length, 0);
    const result = new Uint8Array(total);
    let offset = 0;
    for (const c of chunks) { result.set(c, offset); offset += c.length; }
    return result;
  })();
  
  const timeoutPromise = new Promise((_, reject) =>
    setTimeout(() => reject(new Error('Timeout')), ms)
  );
  
  try {
    return await Promise.race([readPromise, timeoutPromise]);
  } catch (e) {
    if (e.message === 'Timeout') return new Uint8Array(0);
    throw e;
  }
}
</script>
