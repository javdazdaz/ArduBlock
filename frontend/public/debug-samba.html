<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>SAM-BA Debug VPS</title>
<style>body{font-family:monospace;background:#1a1a2e;color:#e0e0e0;padding:20px;max-width:900px;margin:auto}
button{margin:4px;padding:8px 16px;cursor:pointer;background:#333;color:#e0e0e0;border:1px solid #555;border-radius:4px}
button:hover{background:#444} button:disabled{opacity:.5}
#log{background:#0a0a0f;padding:12px;border-radius:4px;min-height:400px;max-height:600px;overflow-y:auto;white-space:pre-wrap;font-size:13px;line-height:1.5}
.ok{color:#5f5}.err{color:#f55}.warn{color:#fa0}.info{color:#5af}.hex{color:#a5f}</style></head>
<body>
<h1>SAM-BA Debug — VPS</h1>
<button onclick="test()">🚀 Test: open 230400 → N# → V# → I#</button>
<p>Antes de probar: <b>presioná RESET dos veces</b> en el R4 (el LED L debe pulsar).</p>
<div id="log"></div>
<script>
const L=(m,c='')=>{const t=new Date().toLocaleTimeString();log.innerHTML+=`<div class="${c}">[${t}] ${m}</div>`;log.scrollTop=log.scrollHeight}
async function test(){
  L('Solicitando puerto...','info');
  const port=await navigator.serial.requestPort();
  const info=port.getInfo();
  L(`Puerto: VID=${info.usbVendorId?.toString(16)} PID=${info.usbProductId?.toString(16)}`,'info');
  await port.open({baudRate:230400});
  L('✓ Abierto a 230400','ok');
  const sigs=await port.getSignals();
  L(`Señales: DSR=${sigs.dataSetReady} CTS=${sigs.clearToSend} DCD=${sigs.dataCarrierDetect} RI=${sigs.ringIndicator}`,'info');
  await sleep(200);

  // N#
  L('--- N# ---','info');
  let writer=port.writable.getWriter();
  await writer.write(new TextEncoder().encode('N#'));
  writer.releaseLock();
  await sleep(200);
  let reader=port.readable.getReader();
  let {value}=await Promise.race([reader.read(),new Promise((_,r)=>setTimeout(()=>r({value:null}),3000))]);
  reader.releaseLock();
  if(value&&value.length){L(`N#: ${value.length}B ${Array.from(value).map(b=>b.toString(16).padStart(2,'0')).join(' ')}`,'hex')}
  else{L('N#: sin respuesta','err');await port.close();return}

  // V#
  L('--- V# ---','info');
  writer=port.writable.getWriter();
  await writer.write(new TextEncoder().encode('V#'));
  writer.releaseLock();
  await sleep(200);
  reader=port.readable.getReader();
  ({value}=await Promise.race([reader.read(),new Promise((_,r)=>setTimeout(()=>r({value:null}),3000))]));
  reader.releaseLock();
  if(value&&value.length){L(`V#: ${new TextDecoder().decode(value).trim()}`,'ok')}
  else{L('V#: sin respuesta','err');await port.close();return}

  // I#
  L('--- I# ---','info');
  writer=port.writable.getWriter();
  await writer.write(new TextEncoder().encode('I#'));
  writer.releaseLock();
  await sleep(200);
  reader=port.readable.getReader();
  ({value}=await Promise.race([reader.read(),new Promise((_,r)=>setTimeout(()=>r({value:null}),3000))]));
  reader.releaseLock();
  if(value&&value.length){L(`I#: ${new TextDecoder().decode(value).trim()}`,'ok')}
  else{L('I#: sin respuesta','err');await port.close();return}

  L('✅ SAM-BA funciona en VPS!','ok');
  await port.close();
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
if(!('serial' in navigator))L('✕ Web Serial no soportado','err');
else L('✓ Web Serial soportada','ok');
</script>
</body>
</html>
